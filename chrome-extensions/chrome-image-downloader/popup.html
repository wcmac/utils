<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #222;
    }
    h3 { font-size: 15px; margin-bottom: 14px; }
    .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
    .dir-path {
      font-size: 12px;
      font-family: monospace;
      word-break: break-all;
      padding: 8px 10px;
      background: #f4f4f4;
      border-radius: 5px;
      margin-bottom: 12px;
      min-height: 34px;
      color: #333;
    }
    .dir-path.unset { color: #aaa; font-style: italic; font-family: inherit; }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    button:disabled { background: #aaa; cursor: default; }
    .status { margin-top: 10px; font-size: 12px; color: #c00; min-height: 16px; }
    .last-dl { margin-top: 10px; font-size: 11px; color: #555; word-break: break-all; border-top: 1px solid #eee; padding-top: 8px; }
    .last-dl.err { color: #c00; }
    .last-dl-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
    .version { margin-top: 8px; font-size: 10px; color: #bbb; text-align: right; }
  </style>
</head>
<body>
  <h3>Image Downloader</h3>
  <div class="label">Download folder</div>
  <div class="dir-path unset" id="dirPath">Not set — click below to choose</div>
  <button id="changeBtn">Choose Folder…</button>
  <div class="status" id="status"></div>
  <div id="lastDlWrap" style="display:none">
    <div class="last-dl-label">Last download</div>
    <div class="last-dl" id="lastDl"></div>
  </div>
  <div class="version" id="version"></div>
  <script src="popup.js"></script>
</body>
</html>
